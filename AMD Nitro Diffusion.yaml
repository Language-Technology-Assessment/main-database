# Liesenfeld, A. and Dingemanse, M., 2024. Rethinking open source generative AI: open-washing and the EU AI Act. In Proceedings of the 2024 ACM Conference on Fairness, Accountability, and Transparency (pp. 1774-1787).

# Organization tags:
# - National origin: United States
# - Contributor type: Non-academic (Company)

# Training compute:
# - Base model training compute: -
# - End model training compute: ~3e+20 FLOP to ~1e+21 FLOP (hardware estimation based on comparison with Nitro-E)

system:
    name: Nitro-AR
    link: https://huggingface.co/amd/Nitro-AR
    type: image
    performanceclass: limited
    basemodelname: Nitro-AR
    endmodelname: Nitro-AR
    endmodellicense:  Apache-2.0
    releasedate: 2026-01
    notes: Autoregressive image gen model.

org:
    name: AMD
    link: https://www.amd.com/en.html
    notes: AMD, a major chip manufacturer.

# availability:
datasources_basemodel:
    class: open
    link: ["https://ai.meta.com/datasets/segment-anything/", "https://github.com/JourneyDB/JourneyDB", "https://github.com/poloclub/diffusiondb", "https://github.com/mlfoundations/datacomp"]
    notes: All datasets listed on model card.

datasources_endmodel:
    class: open
    link: ["https://ai.meta.com/datasets/segment-anything/", "https://github.com/JourneyDB/JourneyDB", "https://github.com/poloclub/diffusiondb", "https://github.com/mlfoundations/datacomp"]
    notes: All datasets listed on model card.

weights_basemodel:
    class: open
    link: https://huggingface.co/amd/Nitro-AR
    notes: Weights available through HuggingFace.
    
weights_endmodel:
    class: open
    link: https://huggingface.co/amd/Nitro-AR
    notes: Weights available through HuggingFace.

trainingcode:
    class: open
    link: https://github.com/AMD-AGI/Nitro-E/tree/main/Nitro-AR
    notes: Training code made available through GitHub.

# documentation:
code:
    class: open
    link: https://github.com/AMD-AGI/Nitro-E/tree/main/Nitro-AR
    notes: Model code well-documented.

hardware_architecture:
    class: open
    link: https://github.com/AMD-AGI/Nitro-E/blob/main/Nitro-AR/configs/config.yaml
    notes: Outlined on GitHub.

preprint:
    class: closed
    link:
    notes: No preprint available.

paper:
    class: closed
    link:
    notes:

modelcard:
    class: partial
    link: https://huggingface.co/amd/Nitro-AR
    notes: Model card provides superficial knowledge about architecture, training, the fine-tuning approach used, and evaluation. 

datasheet:
    class: open
    link: ["https://arxiv.org/abs/2304.02643", "https://arxiv.org/abs/2307.00716", "https://poloclub.github.io/diffusiondb/datasheet.html", "https://arxiv.org/abs/2304.14108"]
    notes: All datasets have associated preprints or datasheets.

# access:
licenses:
    class: partial
    link: ["https://huggingface.co/amd/Nitro-AR#license", "https://github.com/AMD-AGI/Nitro-E/tree/main/Nitro-AR", "https://ai.meta.com/datasets/segment-anything/", "https://github.com/JourneyDB/JourneyDB", "https://github.com/poloclub/diffusiondb", "https://github.com/mlfoundations/datacomp"]
    notes: "Weights: Apache-2.0. Code: Apache-2.0. Data: limited."
